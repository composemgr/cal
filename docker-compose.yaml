# nginx proxy address - http://172.17.0.1:3000

name: cal
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: calcom/cal.com:latest
    container_name: cal-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      NEXTAUTH_SECRET: ${APP_SECRET_KEY:-changeme_secret_key_min_32_chars}
      NEXTAUTH_URL: http://${BASE_HOST_NAME:-localhost}:3000
      CALENDSO_ENCRYPTION_KEY: ${ENCRYPTION_KEY:-changeme_encryption_key_32chars}
      DATABASE_URL: postgresql://${DB_USER_NAME:-cal}:${DB_USER_PASS:-changeme_db_password}@cal-db:5432/${DB_CREATE_DATABASE_NAME:-cal}
      EMAIL_FROM: ${EMAIL_SERVER_MAIL_FROM:-cal@example.com}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST:-172.17.0.1}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-587}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER:-}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASS:-}
    ports:
      - '172.17.0.1:3000:3000'
    volumes:
      - './volumes/data/cal:/data'
    depends_on:
      cal-db:
        condition: service_healthy
    networks:
      - cal

  cal-db:
    image: postgres:latest
    container_name: cal-db
    hostname: cal-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_DB: ${DB_CREATE_DATABASE_NAME:-cal}
      POSTGRES_USER: ${DB_USER_NAME:-cal}
      POSTGRES_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - './volumes/data/db/postgres/cal:/var/lib/postgresql/data'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cal

networks:
  cal:
    name: cal
    external: false
